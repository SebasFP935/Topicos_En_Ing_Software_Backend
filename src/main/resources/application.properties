spring.application.name=TSIS

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/tsis_db
spring.datasource.username=tsis_owner
spring.datasource.password=owner1
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# create-drop recreates tables at startup (dev only)
# update updates schema without dropping data
# validate only validates schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BOOLEAN

# JWT
# Secret key should have at least 64 chars for HS512
jwt.secret=5b04a5e3d2f1a9c8b7e6d5c4f3a2b1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# Default admin bootstrap
app.init.admin.email=admin@tsis.com
app.init.admin.password=Admin123*
app.init.admin.nombre=Admin
app.init.admin.apellido=Principal

server.port=8082
